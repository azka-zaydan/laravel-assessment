services:
  db:
    image: postgres:17-alpine
    container_name: culinary-bot-db
    environment:
      POSTGRES_DB: culinary_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: culinary-bot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # app / worker / scheduler services are defined once we have a Dockerfile
  # built on FrankenPHP. For local dev, run `php artisan serve` + `queue:work`
  # on the host against the db+redis containers above.

volumes:
  pgdata:
