services:
  db:
    image: postgres:17-alpine
    container_name: culinary-bot-db
    environment:
      POSTGRES_DB: culinary_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: culinary-bot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: culinary-bot-app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Bind-mount host source for live-reload in local dev.
      - .:/app
      # Named volume keeps the container-built vendor/ from being shadowed
      # by the host directory (where vendor/ may be absent or differ).
      - vendor:/app/vendor
    restart: unless-stopped

  worker:
    build: .
    container_name: culinary-bot-worker
    command: php artisan queue:work redis --tries=3 --timeout=90 --sleep=3
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - vendor:/app/vendor
    restart: unless-stopped

  scheduler:
    build: .
    container_name: culinary-bot-scheduler
    command: php artisan schedule:work
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - vendor:/app/vendor
    restart: unless-stopped

volumes:
  pgdata:
  vendor:
